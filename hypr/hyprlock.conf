# ══════════════════════════════════════════════════════════════════
#  hyprlock.conf  —  macOS 26-style lock screen
#  Place at: ~/.config/hypr/hyprlock.conf
#
#  TWO MODES — comment/uncomment the background block you want:
#    [A] TRANSPARENT  →  live desktop visible through blur (default)
#    [B] OPAQUE       →  solid dark overlay, no desktop bleed-through
#
#  Layout (top → bottom, centered):
#    • Big clock  (HH:MM)
#    • Day, Month Date
#    • Avatar image  (circle)
#    • Username label
#    • Glassmorphic password pill
#    • Failed-attempt message
# ══════════════════════════════════════════════════════════════════

# ── General ───────────────────────────────────────────────────────
general {
    hide_cursor        = true
    grace              = 0          # seconds before lock is enforced
    ignore_empty_input = true       # don't show fail msg on empty submit
    immediate_render   = true       # no blank flash before widgets appear
    no_fade_in         = false
    no_fade_out        = false
    transparent        = true       # REQUIRED: renders on transparent canvas instead of black
}

# ── Animations ────────────────────────────────────────────────────
animations {
    enabled = true
    bezier  = smoothOut, 0.36, 0, 0.66, -0.56
    bezier  = smoothIn,  0.25, 1, 0.5,  1

    animation = fadeIn,  1, 5, smoothIn
    animation = fadeOut, 1, 5, smoothOut
    animation = inputFieldColors, 1, 3, smoothIn
}

# ══════════════════════════════════════════════════════════════════
# [A] TRANSPARENT BACKGROUND  (blurred live desktop)
#     • path = ""  tells hyprlock to capture the current screen
#     • general { transparent = false } must stay false here — the
#       blur IS the "transparency effect" rendered over the desktop
#       screenshot hyprlock takes at lock time.
# ══════════════════════════════════════════════════════════════════
background {
    monitor      =           # blank = all monitors
    path         = screenshot      # captures your live desktop at lock time, then blurs it
    color        = rgba(0, 0, 0, 0)

    # Blur (tweak passes/size to taste — 3/4 ≈ macOS frosted glass)
    blur_passes        = 3
    blur_size          = 4
    noise              = 0.02
    contrast           = 1.0
    brightness         = 0.75    # darken slightly so text pops
    vibrancy           = 0.15
    vibrancy_darkness  = 0.0
}

# ══════════════════════════════════════════════════════════════════
# [B] OPAQUE BACKGROUND  (no desktop bleed-through)
#     Swap this in by commenting out [A] above and uncommenting here.
# ══════════════════════════════════════════════════════════════════
# background {
#     monitor  =
#     path     =
#     color    = rgba(18, 18, 28, 1.0)   # deep navy-black
#
#     blur_passes = 0   # no blur needed on a solid color
# }

# ══════════════════════════════════════════════════════════════════
#  WIDGETS  — macOS 26 layout
#  Coordinate system: position = X, Y from the anchor set by
#  halign/valign.  Positive Y moves UP, negative moves DOWN.
# ══════════════════════════════════════════════════════════════════

# ── 1. Clock (large, top-center) ──────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%H:%M')"
    color       = rgba(255, 255, 255, 0.95)
    font_size   = 96
    font_family = SF Pro Display Bold, Inter Bold, sans-serif Bold

    shadow_passes   = 2
    shadow_size     = 4
    shadow_color    = rgba(0, 0, 0, 0.35)
    shadow_boost    = 1.0

    position  = 0, 320      # above center
    halign    = center
    valign    = center
    zindex    = 1
}

# ── 2. Date (below clock) ─────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(LC_TIME=C date +'%A, %B %-d')"
    color       = rgba(255, 255, 255, 0.80)
    font_size   = 22
    font_family = SF Pro Display, Inter, sans-serif

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(0, 0, 0, 0.30)

    position  = 0, 220      # just below clock
    halign    = center
    valign    = center
    zindex    = 1
}



# ── 5. Frosted-glass pill behind the input field ──────────────────
#  Drawn first (lower zindex) so the input sits on top of it.
shape {
    monitor      =
    size         = 300, 52
    color        = rgba(255, 255, 255, 0.10)
    rounding     = 26                        # fully rounded pill
    border_size  = 1
    border_color = rgba(255, 255, 255, 0.20)
    xray         = false                     # renders over blur, not through it

    position  = 0, -200
    halign    = center
    valign    = center
    zindex    = 1
}

# ── 6. Password input field ───────────────────────────────────────
input-field {
    monitor           =
    size              = 280, 50
    outline_thickness = 0               # border handled by the shape above

    dots_size         = 0.22
    dots_spacing      = 0.25
    dots_center       = true
    dots_rounding     = -1

    outer_color       = rgba(0, 0, 0, 0)    # transparent — shape is the pill
    inner_color       = rgba(0, 0, 0, 0)

    font_color        = rgba(255, 255, 255, 0.90)
    font_family       = SF Pro Display, Inter, sans-serif
    font_size         = 15

    placeholder_text  = <i><span foreground="##ffffff88">Password</span></i>
    hide_input        = false
    rounding          = 26

    check_color       = rgba(100, 210, 255, 0.90)
    fail_color        = rgba(255, 100, 100, 0.90)

    fade_on_empty     = false
    capslock_color    = rgba(255, 200,  60, 0.90)
    numlock_color     = rgba(255, 255, 255, 0.90)
    bothlock_color    = rgba(255, 200,  60, 0.90)

    position  = 0, -200
    halign    = center
    valign    = center
    zindex    = 2
}